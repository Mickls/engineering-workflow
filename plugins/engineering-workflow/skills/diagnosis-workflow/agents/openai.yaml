interface:
  display_name: "Diagnosis Workflow"
  short_description: "普通 bug 和失败测试的反馈循环、复现、假设验证和回归修复"
  default_prompt: "按诊断工作流处理这个问题：先建立能观察真实症状的可靠反馈循环，检查速度、确定性和断言精度；无反馈循环或根因证据前不得修改生产逻辑。观测不足时先补 targeted instrumentation、日志、trace、metric 或说明缺口；不得用兜底、吞错、重试、sleep、跳过步骤或默认值掩盖未证明根因。修复后运行最小复现和原始反馈循环。除非用户或项目规则明确要求其他语言，回复和落盘工作产物的正文、标题、表格列名和状态解释默认使用中文；文件名、命令、API、代码标识符、状态枚举和引用路径可以保留英文。"
