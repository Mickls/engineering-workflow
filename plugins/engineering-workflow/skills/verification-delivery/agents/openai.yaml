interface:
  display_name: "Verification Delivery"
  short_description: "lint/test/build 验证、完成声明门禁和最终交付格式"
  default_prompt: "按验证和交付规则检查这个任务：核销 .codex/engineering-workflow 下的 design/plan、project/contracts.md 或 no-doc 最小关键约束清单，提供 lint/test/build 证据、未验证项和剩余风险；同时完成防御式代码 diff audit，说明新增/删除/保留/未动的字符串标准化、空值/空内容判断、依赖存在性判断和默认值兜底候选。"
