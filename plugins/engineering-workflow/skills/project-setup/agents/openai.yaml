interface:
  display_name: "Project Setup"
  short_description: "初始化或刷新项目级工程上下文、命令、契约、术语、ADR 和 issue 约定"
  default_prompt: "按项目工程上下文初始化和刷新流程检查当前仓库：先判断 .codex/engineering-workflow/project、context.md、adr 等协作文档是否缺失或 stale，按 bootstrap / refresh / targeted-refresh / audit-only 选择最小足够模式；创建或更新 project/contracts.md、commands.md、project-profile.md、issue-workflow.md 和领域上下文时记录 freshness 元数据、证据路径、scan_scope、watch_patterns 和 known_gaps；说明当前语言/框架的请求标准化、validation 边界、依赖保证、实现路径契约、仍不安全边界和防御式代码候选模式。实现路径契约应覆盖统一实例化、DI/provider、generated code、schema/migration/codegen、事务和异步/手动生成流程，写清正确路径、禁止绕过方式和证据位置；这些产物默认不纳入 git。除非用户或项目规则明确要求其他语言，回复和落盘工作产物的正文、标题、表格列名和状态解释默认使用中文；文件名、命令、API、代码标识符、状态枚举和引用路径可以保留英文。若项目要求英文主文档，在 project-profile.md 或 issue-workflow.md 记录主文档语言规则、触发中文 review aid 的 artifact 类型、辅助说明位置，以及 duplicate translated report 规则是否影响 .codex review aid。"
