interface:
  display_name: "Project Setup"
  short_description: "初始化或刷新项目级工程上下文、命令、契约、术语、ADR 和 issue 约定"
  default_prompt: "按项目工程上下文初始化和刷新流程检查当前仓库：先通过 tool_search 判断 Tolaria MCP 是否可用；可用且有 active vault 时创建或复用当前项目的 Tolaria project，并把其 engineering-workflow 目录作为工作产物根目录，否则回退到 .codex/engineering-workflow。随后判断工作产物根目录下 project、context.md、adr 等协作文档是否缺失或 stale，按 bootstrap / refresh / targeted-refresh / audit-only 选择最小足够模式；创建或更新 project/contracts.md、commands.md、project-profile.md、issue-workflow.md 和领域上下文时记录 freshness 元数据、证据路径、scan_scope、watch_patterns、known_gaps、Tolaria 探测结果和 fallback 路径；说明当前语言/框架的请求标准化、validation 边界、依赖保证、仍不安全边界和防御式代码候选模式；这些产物默认不纳入 git。除非用户或项目规则明确要求其他语言，回复和落盘工作产物的正文、标题、表格列名和状态解释默认使用中文；文件名、命令、API、代码标识符、状态枚举和引用路径可以保留英文。若项目要求英文主文档，在 project-profile.md 或 issue-workflow.md 记录主文档语言规则、触发中文 review aid 的 artifact 类型、辅助说明位置，以及 duplicate translated report 规则是否影响工作产物 review aid。"
