interface:
  display_name: "Requirements Workflow"
  short_description: "需求对齐、.codex issue 文档、design/plan 和需求变更流程"
  default_prompt: "按需求工作流分析这个任务：先对齐需求和调用链，读取 project/contracts.md 中适用的输入标准化、validation 边界和依赖保证；非轻量需求默认在 .codex/engineering-workflow/issues 下创建或更新 design/plan，写入输入契约、关键约束覆盖表和需求覆盖矩阵，并在用户确认前停止。正式 design 只保留当前有效方案，删除上一版废弃概念、纠错痕迹和过程叙述。用户要求不写文档时，按非轻量 no-doc 例外保留最小约束清单。"
