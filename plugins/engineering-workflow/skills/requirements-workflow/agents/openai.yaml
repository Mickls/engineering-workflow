interface:
  display_name: "Requirements Workflow"
  short_description: "需求对齐、工作产物 issue 文档、design/plan 和需求变更流程"
  default_prompt: "按需求工作流分析这个任务：先对齐需求和调用链，并检查当前工作产物根目录下 project/contracts.md、commands.md、project-profile.md、issue-workflow.md、context.md 或 context-map.md 是否缺失或 stale；工作产物根目录由 project-setup 路由决定，Tolaria MCP 可用时优先使用 Tolaria project，失败时回退到 .codex/engineering-workflow；非轻量需求缺少上下文时先用 project-setup bootstrap，命中 watch_patterns、known_gaps 或超出 scan_scope 时先 targeted-refresh。随后在工作产物根目录 issues 下创建或更新 design/plan，写入输入契约、freshness 状态、关键约束覆盖表和需求覆盖矩阵，并在用户确认前停止。正式 design 只保留当前有效方案，删除上一版废弃概念、纠错痕迹和过程叙述。用户要求不写文档时，按非轻量 no-doc 例外保留最小约束清单、临时项目契约和风险。除非用户或项目规则明确要求其他语言，回复和落盘工作产物的正文、标题、表格列名和状态解释默认使用中文；文件名、命令、API、代码标识符、状态枚举和引用路径可以保留英文。若项目要求英文主文档，英文文档保持权威；非轻量且需要用户 review 时，在工作产物根目录下生成或更新中文 review 辅助说明，适用于 design/plan 以及项目自定义 exploration note、runbook、checklist、report、ADR、protocol、story、support content 等 durable artifact；记录源文件、source_commit 或更新时间、生成时间、摘要、关键决策、关键约束、风险和待确认问题。"
